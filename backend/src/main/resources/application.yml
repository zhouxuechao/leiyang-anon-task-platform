server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./data/db;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:2s}
      repositories:
        enabled: false
  rabbitmq:
    host: ${RABBITMQ_HOST:127.0.0.1}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

email:
  hostName: ${EMAIL_HOSTNAME:smtp.gmail.com}
  email: ${EMAIL_EMAIL:diaogualai@gmail.com}
  emailName: ${EMAIL_EMAILNAME:叼瓜赖圈}
  emailPassword: ${EMAIL_EMAILPASSWORD:}
  port: ${EMAIL_PORT:465}
  ssl: ${EMAIL_SSL:true}
  sslTrust: ${EMAIL_SSL_TRUST:*}
  starttls: ${EMAIL_STARTTLS:false}

app:
  jwt:
    issuer: leiyang-anon-task
    secret: change-me-in-prod-change-me-in-prod-change-me
    expire-minutes: 43200
  mp:
    allow-mock-login: true
    app-id: wxb5ab025d654135ef
    app-secret: 464a039a95369bd0f3c8fda4584b735a
  limits:
    max-ongoing-orders: 3
  mq:
    enabled: ${APP_MQ_ENABLED:false}
    retry:
      max-attempts: ${APP_MQ_RETRY_MAX_ATTEMPTS:3}
      initial-interval-ms: ${APP_MQ_RETRY_INITIAL_INTERVAL_MS:1000}
      multiplier: ${APP_MQ_RETRY_MULTIPLIER:2.0}
      max-interval-ms: ${APP_MQ_RETRY_MAX_INTERVAL_MS:10000}
  wxpay:
    enabled: ${WXPAY_ENABLED:false}
    mch-id: ${WXPAY_MCH_ID:}
    api-v3-key: ${WXPAY_API_V3_KEY:}
    serial-no: ${WXPAY_SERIAL_NO:}
    private-key-path: ${WXPAY_PRIVATE_KEY_PATH:}
    private-key: ${WXPAY_PRIVATE_KEY:}
    notify-domain: ${WXPAY_NOTIFY_DOMAIN:}

  upload:
    dir: ./data/uploads
    oss:
      enabled: ${OSS_ENABLED:false}
      endpoint: ${OSS_ENDPOINT:}
      bucket: ${OSS_BUCKET:}
      access-key-id: ${OSS_ACCESS_KEY_ID:wxb5ab025d654135ef}
      access-key-secret: ${OSS_ACCESS_KEY_SECRET:464a039a95369bd0f3c8fda4584b735a}
      base-url: ${OSS_BASE_URL:}
      dir: ${OSS_DIR:leiyang/}
      public-read: ${OSS_PUBLIC_READ:true}
      signed-url: ${OSS_SIGNED_URL:true}
      signed-url-expire-seconds: ${OSS_SIGNED_URL_EXPIRE_SECONDS:31536000}

logging:
  file:
    name: ${LOG_FILE:./logs/app.log}
  level:
    com.leiyang.anontask: ${APP_LOG_LEVEL:INFO}
    org.springframework.security: INFO
